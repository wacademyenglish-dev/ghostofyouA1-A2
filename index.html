    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            overflow: hidden; /* Prevent body scroll, manage internally */
            user-select: none;
        }

        /* Glassmorphism & Borders */
        .glass {
            background: rgba(24, 24, 24, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .glass-card {
            background: #181818;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.2s ease, transform 0.2s ease;
        }
        
        .glass-card:hover {
            background: #282828;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .pulse-red { animation: pulseRed 0.5s ease-out; }
        @keyframes pulseRed {
            0% { background-color: #ef4444; }
            100% { background-color: #121212; }
        }

        .pulse-green { animation: pulseGreen 0.5s ease-out; }
        @keyframes pulseGreen {
            0% { background-color: #1DB954; }
            100% { background-color: #121212; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Sliders */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #1DB954;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 15px rgba(29, 185, 84, 0.6);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: #535353;
            border-radius: 3px;
        }

        /* 3D Flip Cards */
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); }
        .flipped .card-inner { transform: rotateY(180deg); }

        /* Concept Pillars */
        .pillar { transition: all 0.5s cubic-bezier(0.4, 0.2, 0.2, 1); cursor: pointer; }
        .pillar-expanded { flex: 4; background: #282828 !important; border-color: #1DB954 !important;}
        .pillar-collapsed { flex: 1; opacity: 0.6; }
        .pillar-collapsed:hover { opacity: 0.9; }

        /* Sync Lyrics */
        .lyric-line { transition: all 0.2s; cursor: pointer; opacity: 0.5; }
        .lyric-line:hover { opacity: 1; color: #FFFFFF; transform: translateX(10px); }
        .lyric-active { opacity: 1; color: #1DB954; font-weight: 800; transform: scale(1.05) translateX(10px); border-left-color: #1DB954 !important; }

        /* Video Glow */
        .video-glow {
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
        }

        /* Drag and Drop Styles */
        .draggable-word { cursor: grab; }
        .draggable-word:active { cursor: grabbing; opacity: 0.7; transform: scale(0.95); }
        .bucket-over { border-color: #1DB954 !important; background-color: #202020 !important; }
    </style>
</head>

        const app = {
            level: null,
            trackData: [],
            currentIndex: 0,
            hp: 100,
            xp: 0,
            isPlaying: false,

            init() {
                this.renderDashboard();
                lucide.createIcons();
            },

            loadLevel(lvl) {
                this.level = lvl;
                this.trackData = lessons[lvl];
                this.currentIndex = 0;
                this.hp = 100;
                this.xp = 0;
                
                const statusBar = document.getElementById('status-bar');
                if (statusBar) {
                    statusBar.classList.remove('hidden');
                    statusBar.classList.add('flex');
                }
                
                const playerArtist = document.getElementById('player-artist');
                if (playerArtist) playerArtist.innerText = `My Chemical Romance • Level ${lvl}`;
                
                this.updateStatus();
                this.renderSlide();
            },

            goHome() {
                this.level = null;
                const statusBar = document.getElementById('status-bar');
                if (statusBar) {
                    statusBar.classList.add('hidden');
                    statusBar.classList.remove('flex');
                }
                const playerArtist = document.getElementById('player-artist');
                if (playerArtist) playerArtist.innerText = `My Chemical Romance • Select Level`;
                
                const progressCurrent = document.getElementById('progress-current');
                if (progressCurrent) progressCurrent.innerText = '0';
                
                const progressTotal = document.getElementById('progress-total');
                if (progressTotal) progressTotal.innerText = '0';
                
                const progressBarFill = document.getElementById('progress-bar-fill');
                if (progressBarFill) progressBarFill.style.width = '0%';
                
                this.renderDashboard();
            },

            updateStatus() {
                const hpDisplay = document.getElementById('hp-display');
                if (hpDisplay) hpDisplay.innerText = `${this.hp} HP`;
                
                const xpDisplay = document.getElementById('xp-display');
                if (xpDisplay) xpDisplay.innerText = `${this.xp} XP`;
                
                if (this.trackData && this.trackData.length > 0) {
                    const current = this.currentIndex + 1;
                    const total = this.trackData.length;
                    
                    const progressCurrent = document.getElementById('progress-current');
                    if (progressCurrent) progressCurrent.innerText = current;
                    
                    const progressTotal = document.getElementById('progress-total');
                    if (progressTotal) progressTotal.innerText = total;
                    
                    const progressBarFill = document.getElementById('progress-bar-fill');
                    if (progressBarFill) progressBarFill.style.width = `${(current / total) * 100}%`;
                }
            },

            takeDamage(amount) {
                this.hp = Math.max(0, this.hp - amount);
                this.updateStatus();
                const container = document.getElementById('main-container');
                if (container?.classList) {
                    container.classList.add('pulse-red');
                    setTimeout(() => container.classList.remove('pulse-red'), 500);
                }
            },

            gainXP(amount) {
                this.xp += amount;
                this.updateStatus();
                const container = document.getElementById('main-container');
                if (container?.classList) {
                    container.classList.add('pulse-green');
                    setTimeout(() => container.classList.remove('pulse-green'), 500);
                }
            },

            nextSlide() {
                if (!this.level || !this.trackData) return;
                if (this.currentIndex < this.trackData.length - 1) {
                    this.currentIndex++;
                    this.renderSlide();
                }
            },

            prevSlide() {
                if (!this.level || !this.trackData) return;
                if (this.currentIndex > 0) {
                    this.currentIndex--;
                    this.renderSlide();
                }
            },

            togglePlay() {
                this.isPlaying = !this.isPlaying;
                const icon = document.getElementById('play-icon');
                if (icon) {
                    if (this.isPlaying) {
                        icon.setAttribute('data-lucide', 'pause');
                        icon.classList.remove('ml-1');
                    } else {
                        icon.setAttribute('data-lucide', 'play');
                        icon.classList.add('ml-1');
                    }
                }
                lucide.createIcons();
            },

            renderDashboard() {

            renderSlide() {
                this.updateStatus();
                if (!this.trackData) return;
                const slide = this.trackData[this.currentIndex];
                let contentHTML = '';

                switch(slide.type) {
                    case 'bGuide': contentHTML = this.renderBGuide(slide); break;
                    case 'bCover': contentHTML = this.renderBCover(slide); break;
                    case 'bPreWatch': contentHTML = this.renderBPreWatch(slide); break;
                    case 'bVideo': contentHTML = this.renderBVideo(slide); break;
                    case 'bSoundcheck': contentHTML = this.renderBSoundcheck(slide); break;
                    case 'bBehindLyrics': contentHTML = this.renderBBehindLyrics(slide); break;
                    case 'bLyricsSync': contentHTML = this.renderBLyricsSync(slide); break;
                    case 'bConceptPillars': contentHTML = this.renderBConceptPillars(slide); break;
                    case 'bLogicGrammar': contentHTML = this.renderBLogicGrammar(slide); break;
                    case 'bCategorization': contentHTML = this.renderBCategorization(slide); break;
                    case 'bRhythmCheck': contentHTML = this.renderBRhythmCheck(slide); break;
                    case 'bDecisionStand': contentHTML = this.renderBDecisionStand(slide); break;
                    case 'bWrap': contentHTML = this.renderBWrap(slide); break;
                    default: contentHTML = `<h1 class="text-2xl">Slide type ${slide.type} not found</h1>`;
                }

                const mainContainer = document.getElementById('main-container');
                if (mainContainer) {
                    mainContainer.innerHTML = `<div class="w-full max-w-6xl fade-in h-full flex flex-col justify-center items-center py-8">${contentHTML}</div>`;
                    
                    if (slide.speakingStarter && !['bBehindLyrics', 'bConceptPillars'].includes(slide.type)) {

                    lucide.createIcons();

                    <div class="w-full h-96 perspective-1000 cursor-pointer group" onclick="flipCard(this)">
                        <div class="card-inner w-full h-full relative transform-style-3d rounded-2xl shadow-2xl">
                            <!-- Front -->
                            <div class="absolute inset-0 backface-hidden bg-[#181818] border border-[#282828] rounded-2xl flex flex-col items-center justify-center p-8 text-center group-hover:border-[#535353] transition duration-300">
                                <span class="absolute top-5 right-5 text-[10px] font-black uppercase tracking-widest ${w.rarity==='Epic'?'text-purple-400':(w.rarity==='Rare'?'text-blue-400':'text-spotify-subtext')} bg-[#282828] px-3 py-1.5 rounded-full border border-[#3E3E3E]">
                                    ${w.rarity}
                                </span>
                                <i data-lucide="${w.icon}" class="w-20 h-20 text-spotify-green mb-8 group-hover:scale-110 transition duration-300"></i>
                                <h3 class="text-4xl font-black mb-4">${w.concept}</h3>
                                <p class="text-sm font-bold text-spotify-subtext mt-auto bg-black/40 px-4 py-2 rounded-full flex items-center gap-2"><i data-lucide="mouse-pointer-click" class="w-4 h-4"></i> Click to flip</p>
                            </div>
                            <!-- Back -->
                            <div class="absolute inset-0 backface-hidden bg-spotify-green rounded-2xl flex flex-col items-center justify-center p-8 text-center rotate-y-180 text-black shadow-[0_0_30px_rgba(29,185,84,0.3)]">
                                <h4 class="text-xl font-black mb-4 border-b-2 border-black/20 pb-4 w-full leading-snug">${w.def}</h4>
                                <p class="text-base font-bold italic mb-8 opacity-80">"${w.q}"</p>
                                <div class="bg-black/10 p-5 rounded-xl w-full text-left border border-black/10">
                                    <span class="text-[10px] uppercase font-black text-black/60 block mb-2 tracking-widest">Your Turn:</span>
                                    <span class="text-lg font-black text-black">${w.start}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('') : '';

                return `
                    <div class="flex flex-col items-center justify-center w-full h-full min-h-[70vh]">
                        <h2 class="text-4xl font-black mb-12 text-center flex items-center gap-4"><i data-lucide="library" class="w-10 h-10 text-spotify-green"></i> Vocab Relics</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl">
                            ${cards}
                        </div>
                    </div>
                `;
            },

            renderBLyricsSync(data) {
                window.activateLyric = function(index) {
                    document.querySelectorAll('.lyric-line').forEach(el => el?.classList.remove('lyric-active'));
                    const activeLine = document.getElementById(`lyric-${index}`);
                    if (activeLine?.classList) {
                        activeLine.classList.add('lyric-active');
                    }
                    
                    if (!app.trackData || !app.trackData[app.currentIndex]) return;
                    const focusData = app.trackData[app.currentIndex].lyrics ? app.trackData[app.currentIndex].lyrics[index] : null;
                    if (!focusData) return;
                    
                    const sidebarFocus = document.getElementById('sidebar-focus');
                    if (sidebarFocus) sidebarFocus.innerText = focusData.focus;
                    
                    const sidebarHook = document.getElementById('sidebar-hook');
                    if (sidebarHook) sidebarHook.innerText = focusData.hook;
                    
                    // Show Follow Up section if it exists
                    const followUpContainer = document.getElementById('sidebar-followup-container');
                    const sidebarFollowup = document.getElementById('sidebar-followup');
                    
                    if(focusData.followUp && followUpContainer && sidebarFollowup) {
                        followUpContainer.classList.remove('hidden');
                        sidebarFollowup.innerText = focusData.followUp;
                    } else if (followUpContainer) {
                        followUpContainer.classList.add('hidden');
                    }
                    
                    // Trigger sidebar animation
                    const sidebar = document.getElementById('lyric-sidebar');
                    if (sidebar?.classList) {
                        sidebar.classList.remove('hidden', 'fade-in');
                        void sidebar.offsetWidth; // trigger reflow
                        sidebar.classList.add('fade-in');
                    }

                    // Update Dynamic Speaking Starter
                    const starterTextEl = document.getElementById('speaking-starter-text');
                    const starterContainer = document.getElementById('speaking-starter-container');
                    if (starterTextEl && starterContainer && focusData.starter) {
                        starterTextEl.innerHTML = focusData.starter;
                        starterContainer.classList.remove('fade-in');
                        void starterContainer.offsetWidth; // trigger reflow
                        starterContainer.classList.add('fade-in');
                    }
                };

                const lyricsHTML = data.lyrics ? data.lyrics.map((l, i) => `
                    <div id="lyric-${i}" class="lyric-line text-3xl md:text-5xl font-black text-[#535353] py-4 pl-6 border-l-4 border-transparent" onclick="activateLyric(${i})">
                        ${l.text}
                    </div>
                `).join('') : '';

                return `
                    <div class="flex flex-col w-full h-full min-h-[75vh]">
                        <h2 class="text-3xl font-black mb-8 text-white">${data.title || "Lyrics Sync"}</h2>
                        <div class="flex flex-col md:flex-row w-full flex-1 gap-12">
                            <!-- Left: Lyrics -->
                            <div class="w-full md:w-7/12 flex flex-col justify-center space-y-6 pr-8 border-r border-[#282828] py-8">
                                ${lyricsHTML}
                            </div>
                            <!-- Right: Genius Sidebar -->
                            <div class="w-full md:w-5/12 flex flex-col justify-center">
                                <div id="lyric-sidebar" class="hidden bg-[#181818] p-10 rounded-2xl border border-[#282828] shadow-2xl relative overflow-hidden">
                                    <div class="absolute top-0 left-0 w-2 h-full bg-spotify-green"></div>
                                    <div class="mb-8">
                                        <h3 class="text-[10px] uppercase font-black tracking-widest text-spotify-subtext mb-3">Grammar Focus</h3>
                                        <div id="sidebar-focus" class="text-3xl font-black text-white leading-tight">...</div>
                                    </div>
                                    <div class="pt-8 border-t border-[#282828]">
                                        <h3 class="text-[10px] uppercase font-black tracking-widest text-spotify-subtext mb-3">Usage Logic</h3>
                                        <div id="sidebar-hook" class="text-lg text-[#B3B3B3] italic leading-relaxed font-medium">...</div>
                                    </div>
                                    <!-- Dynamic Follow Up -->
                                    <div id="sidebar-followup-container" class="hidden pt-8 mt-8 border-t border-[#282828]">
                                        <h3 class="text-[10px] uppercase font-black tracking-widest text-spotify-green mb-3 flex items-center gap-2"><i data-lucide="message-square" class="w-4 h-4"></i> Follow-up Question</h3>
                                        <p id="sidebar-followup" class="text-lg text-white font-bold leading-relaxed">...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            renderBConceptPillars(data) {
                window.expandPillar = function(index) {
                    document.querySelectorAll('.pillar').forEach(el => {
                        el?.classList.remove('pillar-expanded');
                        el?.classList.add('pillar-collapsed');
                        const content = el.querySelector('.pillar-content');
                        if (content?.classList) {
                            content.classList.add('hidden');
                        }
                    });
                    const target = document.getElementById(`pillar-${index}`);
                    if (target?.classList) {
                        target.classList.add('pillar-expanded');
                        target.classList.remove('pillar-collapsed');
                        const content = target.querySelector('.pillar-content');
                        if (content?.classList) {
                            content.classList.remove('hidden');
                            content.classList.add('fade-in');
                        }
                    }
                };

                const pillars = data.pillars ? data.pillars.map((p, i) => `
                    <div id="pillar-${i}" class="pillar ${i===0 ? 'pillar-expanded' : 'pillar-collapsed'} bg-[#181818] border-2 border-[#282828] rounded-2xl flex flex-col justify-end p-8 relative overflow-hidden h-full min-h-[60vh]" onclick="expandPillar(${i})">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/60 to-transparent z-0"></div>
                        <h2 class="text-4xl md:text-5xl font-black text-white z-10 mb-2 transform -rotate-90 origin-bottom-left absolute left-12 bottom-12 opacity-50 transition-opacity uppercase tracking-widest group-hover:opacity-100 whitespace-nowrap">${p.title}</h2>
                        
                        <div class="pillar-content ${i===0 ? '' : 'hidden'} z-10 w-full bg-[#121212]/90 backdrop-blur-xl p-8 rounded-xl border border-white/10 mt-auto shadow-2xl">
                            <h3 class="text-3xl font-black text-spotify-green mb-4">${p.title}</h3>
                            <p class="text-lg text-gray-300 mb-8 font-medium leading-relaxed">${p.text}</p>
                            <div class="border-t border-white/10 pt-6">
                                <p class="text-sm font-bold text-spotify-subtext mb-3 flex items-center gap-2"><i data-lucide="help-circle" class="w-4 h-4"></i> ${p.q}</p>
                                <div class="bg-black/50 p-4 rounded-lg">
                                    <p class="text-base font-black text-white">Starter: <span class="text-spotify-green">${p.start}</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('') : '';

                return `
                    <div class="flex flex-col w-full h-full min-h-[75vh]">
                        <h2 class="text-3xl font-black mb-8 text-white">${data.title || "Concepts"}</h2>
                        <div class="w-full flex gap-4 flex-1">
                            ${pillars}
                        </div>
                    </div>
                `;
            },

            renderBLogicGrammar(data) {
                const rules = data.rules ? data.rules.map(r => `
                    <div class="bg-[#181818] border border-[#282828] p-10 rounded-2xl hover:border-spotify-green transition duration-300 group shadow-lg">
                        <div class="w-12 h-12 rounded-full bg-[#282828] flex items-center justify-center mb-6 group-hover:bg-spotify-green/20 transition">
                            <i data-lucide="zap" class="w-6 h-6 text-spotify-subtext group-hover:text-spotify-green transition"></i>
                        </div>
                        <h3 class="text-3xl font-black text-white mb-4 group-hover:text-spotify-green transition">${r.rule}</h3>
                        <p class="text-lg text-spotify-subtext leading-relaxed font-medium">${r.desc}</p>
                    </div>
                `).join('') : '';

                return `
                    <div class="flex flex-col items-center justify-center space-y-12 w-full max-w-5xl mx-auto min-h-[60vh]">
                        <div class="text-center">
                            <i data-lucide="book-open" class="w-16 h-16 text-spotify-green mx-auto mb-6"></i>
                            <h2 class="text-5xl font-black tracking-tight">${data.title}</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full">
                            ${rules}
                        </div>
                    </div>
                `;
            },

            renderBCategorization(data) {
                // Drag and Drop Logic Implementation
                window.catState = { completed: 0 };
                
                window.dragStart = function(ev, wordIndex) {
                    ev.dataTransfer.setData("wordIndex", wordIndex);
                    if (ev.target?.classList) {
                        ev.target.classList.add('opacity-50', 'scale-95');
                    }
                };

                window.dragEnd = function(ev) {
                    if (ev.target?.classList) {
                        ev.target.classList.remove('opacity-50', 'scale-95');
                    }
                };

                window.allowDrop = function(ev) {
                    ev.preventDefault();
                    const bucket = ev.currentTarget;
                    if(bucket?.classList && !bucket.classList.contains('bucket-over')) {
                        bucket.classList.add('bucket-over');
                    }
                };

                window.dragLeave = function(ev) {
                    if (ev.currentTarget?.classList) {
                        ev.currentTarget.classList.remove('bucket-over');
                    }
                };

                window.drop = function(ev, bucketIndex) {
                    ev.preventDefault();
                    if (ev.currentTarget?.classList) {
                        ev.currentTarget.classList.remove('bucket-over');
                    }
                    
                    const wordIndex = ev.dataTransfer.getData("wordIndex");
                    if (wordIndex === "" || wordIndex === null) return;

                    if (!app.trackData || !app.trackData[app.currentIndex]) return;
                    const correctBucket = app.trackData[app.currentIndex].mapping ? app.trackData[app.currentIndex].mapping[wordIndex] : -1;
                    const wordEl = document.getElementById(`drag-word-${wordIndex}`);

                    if (!wordEl?.classList) return;

                    wordEl.classList.remove('opacity-50', 'scale-95');

                    if(bucketIndex == correctBucket) {
                        app.gainXP(20);
                        wordEl.setAttribute('draggable', 'false');
                        wordEl.classList.remove('hover:bg-[#3E3E3E]', 'cursor-pointer', 'draggable-word', 'bg-[#282828]');
                        wordEl.classList.add('cursor-default', 'bg-spotify-green', 'text-black', 'border-transparent');
                        
                        const bucketContent = document.getElementById(`bucket-content-${bucketIndex}`);
                        if (bucketContent) {
                            bucketContent.appendChild(wordEl);
                        }
                        
                        window.catState.completed++;
                        if(data.items && window.catState.completed === data.items.length) {
                            setTimeout(() => alert('Sector Cleared! Excellent Logic. +XP'), 600);
                        }
                    } else {
                        app.takeDamage(10);
                        if (ev.currentTarget?.classList) {
                            ev.currentTarget.classList.add('pulse-red', 'border-red-500');
                            setTimeout(() => ev.currentTarget?.classList.remove('pulse-red', 'border-red-500'), 500);
                        }
                    }
                };

                const words = data.items ? data.items.map((item, i) => `
                    <div id="drag-word-${i}" class="draggable-word bg-[#282828] px-6 py-4 rounded-xl font-black text-lg transition-all duration-200 select-none shadow-lg border border-[#3E3E3E] hover:bg-[#3E3E3E]" draggable="true" ondragstart="dragStart(event, ${i})" ondragend="dragEnd(event)">
                        ${item}
                    </div>
                `).join('') : '';

                const buckets = data.buckets ? data.buckets.map((b, i) => `
                    <div id="bucket-${i}" class="bg-[#181818] border-2 border-dashed border-[#535353] rounded-2xl p-8 flex flex-col items-center min-h-[250px] transition-all duration-300 shadow-inner" ondragover="allowDrop(event)" ondragleave="dragLeave(event)" ondrop="drop(event, ${i})">
                        <div class="w-16 h-16 rounded-full bg-[#282828] flex items-center justify-center mb-4 pointer-events-none">
                            <i data-lucide="inbox" class="w-8 h-8 text-spotify-subtext"></i>
                        </div>
                        <h3 class="text-2xl font-black text-white mb-2 pointer-events-none text-center">${b}</h3>
                        <p class="text-sm font-bold text-spotify-subtext pointer-events-none mb-6">Drop here</p>
                        <div id="bucket-content-${i}" class="flex flex-wrap justify-center gap-3 w-full pointer-events-none"></div>
                    </div>
                `).join('') : '';

                return `
                    <div class="flex flex-col items-center justify-center w-full max-w-6xl mx-auto space-y-12 min-h-[75vh]">
                        <div class="text-center">
                            <h2 class="text-4xl font-black mb-3">${data.title}</h2>
                            <p class="text-lg text-spotify-subtext font-medium">Drag and drop the phrases into the correct sector.</p>
                        </div>
                        
                        <div id="words-container" class="flex flex-wrap justify-center gap-4 min-h-[80px] w-full max-w-4xl bg-[#121212] p-6 rounded-2xl border border-[#282828]">
                            ${words}
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full">
                            ${buckets}
                        </div>
                    </div>
                `;
            },

            renderBRhythmCheck(data) {
                window.checkAnswer = function(index) {
                    if (!app.trackData || !app.trackData[app.currentIndex]) return;
                    const slideData = app.trackData[app.currentIndex];
                    const btn = document.getElementById(`opt-${index}`);
                    
                    document.querySelectorAll('.rhythm-btn').forEach(b => { if(b) b.disabled = true; });
                    
                    if (!btn?.classList) return;

                    if(index === slideData.correct) {
                        btn.classList.replace('bg-[#282828]', 'bg-spotify-green');
                        btn.classList.replace('text-white', 'text-black');
                        btn.classList.add('scale-105');
                        app.gainXP(50);
                        const feedback = document.getElementById('rhythm-feedback');
                        if (feedback) {
                            feedback.innerHTML = `
                                <div class="fade-in mt-8 bg-[#181818] p-6 rounded-xl border-l-4 border-spotify-green text-left flex gap-5 items-center shadow-2xl">
                                    <div class="bg-spotify-green/20 p-3 rounded-full">
                                        <i data-lucide="check-circle" class="w-8 h-8 text-spotify-green"></i>
                                    </div>
                                    <div>
                                        <p class="font-black text-white text-xl">${slideData.successMsg}</p>
                                    </div>
                                </div>
                            `;
                        }
                        lucide.createIcons();
                    } else {
                        btn.classList.replace('bg-[#282828]', 'bg-red-500');
                        app.takeDamage(25);
                        const feedback = document.getElementById('rhythm-feedback');
                        if (feedback) {
                            feedback.innerHTML = `
                                <div class="fade-in mt-8 p-6 text-center bg-red-900/10 rounded-xl border border-red-500/30">
                                    <p class="text-red-500 font-black text-xl mb-4">Missed the Beat!</p>
                                    <button onclick="app.renderSlide()" class="text-sm font-bold uppercase tracking-widest text-spotify-subtext hover:text-white bg-[#181818] px-6 py-3 rounded-full border border-[#3E3E3E] transition">Try Again <i data-lucide="rotate-ccw" class="inline w-4 h-4 ml-1"></i></button>
                                </div>
                            `;
                        }
                        lucide.createIcons();
                    }
                };

                const options = data.options ? data.options.map((opt, i) => `
                    <button id="opt-${i}" onclick="checkAnswer(${i})" class="rhythm-btn w-full bg-[#282828] hover:bg-[#3E3E3E] text-white font-black py-6 px-8 rounded-2xl transition-all duration-300 border border-[#3E3E3E] hover:border-white/30 text-2xl shadow-lg">
                        ${opt}
                    </button>
                `).join('') : '';

                return `
                    <div class="flex flex-col items-center justify-center w-full max-w-3xl mx-auto text-center min-h-[60vh]">
                        <div class="mb-12 p-10 glass rounded-3xl w-full border border-[#282828] shadow-2xl relative overflow-hidden">
                            <div class="absolute top-0 right-0 w-32 h-32 bg-gradient-to-bl from-spotify-green/20 to-transparent"></div>
                            <span class="text-spotify-green uppercase tracking-widest text-sm font-black mb-4 block flex items-center justify-center gap-2"><i data-lucide="swords" class="w-4 h-4"></i> Combat Drill</span>
                            <h2 class="text-4xl md:text-5xl font-black leading-tight tracking-tight">${data.question}</h2>
                        </div>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full">
                            ${options}
                        </div>
                        
                        <div id="rhythm-feedback" class="w-full h-32"></div>
                    </div>
                `;
            },

            renderBDecisionStand(data) {
                window.updateSliderValue = function(val) {
                    const btn = document.getElementById('defend-btn');
                    if(btn?.classList && btn.classList.contains('opacity-0')) {
                        btn.classList.remove('opacity-0', 'translate-y-4');
                    }
                    
                    const sliderValEl = document.getElementById('slider-val');
                    if (sliderValEl) sliderValEl.innerText = `${val}%`;
                    
                    const track = document.getElementById('decision-track');
                    if (track?.style) {
                        const percentage = val;
                        track.style.background = `linear-gradient(to right, #1DB954 ${percentage}%, #535353 ${percentage}%)`;
                    }
                    
                    const thumb = document.getElementById('slider-thumb-visual');
                    if (thumb?.style) {
                        thumb.style.left = val + '%';
                    }
                };

                return `
                    <div class="flex flex-col items-center justify-center w-full max-w-4xl mx-auto text-center space-y-16 min-h-[60vh]">
                        <div class="bg-[#181818] p-5 rounded-full border border-[#282828] shadow-lg">
                            <i data-lucide="scale" class="w-12 h-12 text-spotify-green"></i>
                        </div>
                        <h2 class="text-4xl md:text-6xl font-black leading-tight tracking-tight max-w-3xl">${data.question}</h2>
                        
                        <div class="w-full bg-[#181818] p-12 rounded-3xl border border-[#282828] shadow-2xl relative">
                            <div class="text-6xl font-black text-white mb-10 drop-shadow-[0_0_15px_rgba(29,185,84,0.3)]" id="slider-val">50%</div>
                            
                            <div class="relative w-full h-2 rounded-full bg-[#535353]" id="decision-track" style="background: linear-gradient(to right, #1DB954 50%, #535353 50%);">
                                <input type="range" min="0" max="100" value="50" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" oninput="updateSliderValue(this.value)">
                                <div class="pointer-events-none absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-white rounded-full shadow-[0_0_15px_rgba(0,0,0,0.5)] z-0 transition-all duration-75" style="left: 50%" id="slider-thumb-visual"></div>
                            </div>
                            
                            <div class="flex justify-between w-full mt-8 text-sm font-black uppercase tracking-widest text-spotify-subtext">
                                <span>${data.labels ? data.labels[0] : ''}</span>
                                <span>${data.labels ? data.labels[1] : ''}</span>
                            </div>
                        </div>

                        <button id="defend-btn" onclick="app.gainXP(100); this.innerHTML='<i data-lucide=\\'check\\' class=\\'w-6 h-6\\'></i> Stand Taken'; this.disabled=true; if(this.classList) this.classList.replace('bg-white', 'bg-spotify-green'); lucide.createIcons();" class="opacity-0 translate-y-4 transition-all duration-500 bg-white text-black font-black py-5 px-12 rounded-full hover:scale-105 flex items-center justify-center gap-3 text-xl shadow-xl">
                            Defend Your Position
                        </button>
                    </div>
                `;
            },

            renderBWrap(data) {
                return `
                    <div class="flex flex-col items-center justify-center text-center space-y-10 min-h-[60vh]">
                        <div class="relative w-40 h-40 flex items-center justify-center mb-6">
                            <div class="absolute inset-0 bg-spotify-green rounded-full opacity-20 animate-ping"></div>
                            <div class="absolute inset-4 bg-spotify-green rounded-full opacity-40 blur-lg"></div>
                            <i data-lucide="award" class="w-24 h-24 text-white relative z-10"></i>
                        </div>
                        <h1 class="text-6xl md:text-8xl font-black uppercase tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-spotify-subtext">${data.title}</h1>
                        <p class="text-2xl font-medium text-spotify-subtext max-w-2xl leading-relaxed">${data.msg}</p>
                        
                        <div class="flex gap-8 mt-10">
                            <div class="bg-[#181818] px-10 py-6 rounded-2xl border border-[#282828] text-center shadow-2xl">
                                <p class="text-sm font-black text-spotify-subtext uppercase tracking-widest mb-2">Final HP</p>
                                <p class="text-5xl font-black text-white">${app.hp}</p>
                            </div>
                            <div class="bg-[#181818] px-10 py-6 rounded-2xl border border-[#282828] text-center shadow-2xl border-b-4 border-b-spotify-green">
                                <p class="text-sm font-black text-spotify-subtext uppercase tracking-widest mb-2">Total XP</p>
                                <p class="text-5xl font-black text-spotify-green drop-shadow-[0_0_10px_rgba(29,185,84,0.5)]">${app.xp}</p>
                            </div>
                        </div>

                        <button onclick="app.goHome()" class="mt-16 text-spotify-subtext font-bold hover:text-white transition flex items-center gap-2 bg-[#282828] px-8 py-4 rounded-full border border-[#3E3E3E] hover:bg-[#3E3E3E]">
                            <i data-lucide="log-out" class="w-5 h-5"></i> Return to Dashboard
                        </button>
                    </div>
                `;
            }
        };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });

    </script>
</body>
</html>
